general {
    gaps_in = 5
    gaps_out = 10

    float_gaps = 0
    gaps_workspaces = 0
}


# Ref https://wiki.hyprland.org/Configuring/Workspace-Rules/
# SMART GAPS
# No gaps when only a single tiled window is present
workspace = w[tv1], gapsout:0, gapsin:0
windowrule = border_size 0, float no, match:workspace w[tv1]
windowrule = rounding 0, float no, match:workspace w[tv1]
# No gaps when only  a single fullscreen window is present
workspace = f[1], gapsout:0, gapsin:0
windowrule = border_size 0, float no, match:workspace f[1]
windowrule = rounding 0, float no, match:workspace f[1]
