general {
    border_size = 3

    # See https://wiki.hyprland.org/Configuring/Variables/#variable-types for info about colors
    # Gruvbox colors
    col.active_border = rgba(504945ff)
    col.inactive_border = rgba(202020ff)


    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # no_border_on_floating = false # removed in update
    hover_icon_on_border = false
}
